name: duofilm
description: Duofilm — le film du soir, ensemble (iOS + Android).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  share_plus: ^13.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  image_path: "assets/icon-1024.png"
  ios: true
  android: true
  remove_alpha_ios: true
  background_color_ios: "#161122"
